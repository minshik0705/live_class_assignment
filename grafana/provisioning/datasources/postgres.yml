# 데이터소스 파일 프로비저닝 — 컨테이너 기동 시 PG 연결이 자동 구성된다.
# UI 클릭 없이 repo의 파일만으로 대시보드까지 재현하기 위한 설정.
apiVersion: 1

datasources:
  - name: EventDB
    uid: eventdb-pg
    type: postgres
    access: proxy
    url: postgres:5432
    user: app
    secureJsonData:
      password: app
    jsonData:
      database: eventdb
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
